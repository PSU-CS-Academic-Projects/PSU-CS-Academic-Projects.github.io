name: Update Project Data

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour at the top of the hour
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit and push changes
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Parser
        run: node parser.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          
          # Only commit and push if data.json has actually changed
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update data.json"
            git push
            echo "Successfully updated data.json"
          else
            echo "No changes in data.json"
          fi
